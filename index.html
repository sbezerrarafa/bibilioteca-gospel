<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca Gospel | Catálogo Digital</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="assets/imgs/favicon.png">
    <link rel="stylesheet" href="./style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a3a5f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Biblioteca Gospel">
    <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
    
</head>
<body>

    <nav class="navbar-custom px-3 py-3">
        <div class="main-container d-flex align-items-center p-0">
            <img src="assets/imgs/logo-biblioteca.PNG" alt="Logo" style="height: 50px; margin-right: 12px;" onerror="this.style.display='none'">
        </div>
    </nav>

    <div class="main-container">
        <div class="search-container">
            <span class="material-symbols-outlined">search</span>
            <input type="text" id="inputBusca" class="search-bar w-100" placeholder="Buscar por título ou autor...">
        </div>

        <div class="category-scroll" id="filtroCategorias"></div>

        <div class="book-grid" id="listaLivros">
            </div>
        <div id="paginacao" class="pagination-container mt-4"></div>    

        <div class="py-5 d-block d-lg-none"></div>
    </div>

    <nav class="bottom-nav">
        <a href="#" class="nav-link-custom active">
            <span class="material-symbols-outlined">grid_view</span>CATÁLOGO
        </a>
        <a href="#" class="nav-link-custom">
            <span class="material-symbols-outlined">import_contacts</span>LENDO
        </a>
        <a href="#" class="nav-link-custom">
            <span class="material-symbols-outlined">favorite</span>FAVORITOS
        </a>
    </nav>
    <script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./service-worker.js')
            .then((registration) => {
                console.log('Service Worker registrado com sucesso:', registration);
            })
            .catch((error) => {
                console.log('Erro ao registrar o Service Worker:', error);
            });
        });
    }
    </script>
    <script src="script.js"></script>
</body>
</html>
